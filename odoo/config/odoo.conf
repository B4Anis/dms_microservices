[options]
admin_passwd = 123456
logfile = /var/log/odoo/odoo.log

webkit_path = /usr/local/bin/wkhtmltopdf

; Threaded mode (no worker killing for long requests like DB restore)
workers = 0

; Long timeouts for DB backup/restore and heavy data operations (seconds)
limit_time_cpu = 3600
limit_time_real = 3600
limit_time_real_cron = 3600

; Memory ceilings (bytes) — 3 GB soft, 4 GB hard
limit_memory_soft = 3221225472
limit_memory_hard = 4294967296

; Allow larger DB dump uploads
db_maxconn = 64
