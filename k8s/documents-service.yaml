apiVersion: apps/v1
kind: Deployment
metadata:
  name: documents-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: documents-service
  template:
    metadata:
      labels:
        app: documents-service
    spec:
      containers:
      - name: documents-service
        image: antigravityec-documents-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://postgres:5432/dms"
        - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
          value: "kafka:9092"
        - name: AWS_S3_ENDPOINT
          value: "http://minio:9000"
---
apiVersion: v1
kind: Service
metadata:
  name: documents-service
spec:
  type: ClusterIP
  ports:
  - port: 8080
  selector:
    app: documents-service
