apiVersion: apps/v1
kind: Deployment
metadata:
  name: dms-ui-prototype
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dms-ui-prototype
  template:
    metadata:
      labels:
        app: dms-ui-prototype
    spec:
      containers:
      - name: frontend
        image: antigravityec-dms-ui-prototype:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: dms-ui-prototype
spec:
  type: NodePort
  ports:
  - port: 80
    nodePort: 30001
  selector:
    app: dms-ui-prototype
